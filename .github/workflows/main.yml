name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.0.x'

    - name: Publish
      working-directory: clarkmeister.github.io
      run: dotnet publish clarkmeister.github.io.csproj -c Release -o release --nologo

    - name: Copy index.html to 404.html
      run: cp clarkmeister.github.io/release/wwwroot/index.html clarkmeister.github.io/release/wwwroot/404.html

    - name: Add .nojekyll
      run: touch clarkmeister.github.io/release/wwwroot/.nojekyll

    - name: Rename .wasm to .bin and fix integrity hashes
      working-directory: clarkmeister.github.io/release/wwwroot/_framework
      run: |
        # Rename all .wasm files to .bin (content unchanged, so their own hashes stay valid)
        find . -name "*.wasm" | while read f; do mv "$f" "${f%.wasm}.bin"; done

        # blazor.webassembly.js holds the SRI hash for dotnet.js (and other JS).
        # Patch each non-loader JS file first, then update its hash inside the loader.
        LOADER=$(find . -name "blazor.webassembly*.js" | head -1)
        find . -name "*.js" ! -name "blazor.webassembly*.js" | while read f; do
          if grep -q '\.wasm' "$f"; then
            OLD_HASH=$(openssl dgst -sha256 -binary < "$f" | base64 -w 0)
            sed -i 's/\.wasm/.bin/g' "$f"
            NEW_HASH=$(openssl dgst -sha256 -binary < "$f" | base64 -w 0)
            sed -i "s|${OLD_HASH}|${NEW_HASH}|g" "$LOADER"
            echo "Rehashedl $(basename $f)"
          fi
        done

        # Now patch the loader itself (index.html has no integrity attr for it)
        sed -i 's/\.wasm/.bin/g' "$LOADER"
        echo "Done. .bin files: $(find . -name '*.bin' | wc -l)"

    - name: Upload Pages artifact
      uses: actions/upload-pages-artifact@v5
      with:
        path: clarkmeister.github.io/release/wwwroot
        include-hidden-files: true

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v5
